<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" role="img" aria-labelledby="title desc">
  <title id="title">Saatvik Raghuvanshi LinkedIn banner</title>
  <desc id="desc">Dark technology banner for Saatvik Raghuvanshi with software engineering roles and tool labels.</desc>
  <defs>
    <linearGradient id="nameAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="0.56" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0b0f19" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#34d399" opacity="0.18"/>
    </pattern>
    <pattern id="lineGrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="#94a3b8" stroke-opacity="0.08"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1584" height="396" fill="#0b0f19"/>
  <rect width="1584" height="396" fill="url(#lineGrid)"/>
  <rect width="1584" height="396" fill="url(#dotGrid)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <g opacity="0.44" font-family="Consolas, monospace" font-size="20" fill="#64748b">
    <text x="42" y="62">const build = async () =&gt; ship(product);</text>
    <text x="42" y="94">stack: react + next + supabase + cloud</text>
    <text x="42" y="126">while (learning) iterate();</text>
    <text x="42" y="158">user.first = true;</text>
  </g>

  <g opacity="0.34" stroke="#60a5fa" stroke-width="2" fill="none">
    <path d="M1250 72h208a20 20 0 0 1 20 20v112a20 20 0 0 1-20 20h-208a20 20 0 0 1-20-20V92a20 20 0 0 1 20-20Z"/>
    <path d="M1268 112h74v42h-74zM1364 112h82M1364 140h62M1268 176h180"/>
    <path d="M1122 310h172l42-42h126"/>
    <path d="M1160 72h-88l-36 36h-72"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="792" y="142" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="72" font-weight="800" fill="#f3f4f6" letter-spacing="6">
      SAATVIK <tspan fill="url(#nameAccent)">RAGHUVANSHI</tspan>
    </text>
    <text x="792" y="190" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="24" font-weight="700" fill="#cbd5e1" letter-spacing="5">
      ASPIRING PRODUCT ENGINEER | FULL-STACK DEVELOPER | CLOUD ENGINEER
    </text>
    <rect x="512" y="216" width="560" height="42" rx="8" fill="#111827" stroke="#1d4ed8" stroke-opacity="0.72"/>
    <text x="792" y="244" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="21" font-weight="800" fill="#f3f4f6" letter-spacing="2">
      BUILDING <tspan fill="#10b981">USEFUL PRODUCTS</tspan>. SHIPPING <tspan fill="#60a5fa">FAST</tspan>.
    </text>
  </g>

  <g transform="translate(294 302)" font-family="Geist, Arial, sans-serif" font-size="16" font-weight="700" fill="#dbeafe">
    <g>
      <circle cx="18" cy="18" r="18" fill="#0f172a" stroke="#10b981" stroke-opacity="0.45"/>
      <text x="52" y="24">React</text>
    </g>
    <g transform="translate(138 0)">
      <circle cx="18" cy="18" r="18" fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.45"/>
      <text x="52" y="24">Next.js</text>
    </g>
    <g transform="translate(298 0)">
      <rect x="0" y="0" width="36" height="36" rx="8" fill="#1d4ed8"/>
      <text x="52" y="24">TypeScript</text>
    </g>
    <g transform="translate(500 0)">
      <circle cx="18" cy="18" r="18" fill="#facc15"/>
      <text x="52" y="24">Python</text>
    </g>
    <g transform="translate(652 0)">
      <path d="M18 1 34 18 18 35 2 18Z" fill="#10b981"/>
      <text x="52" y="24">Supabase</text>
    </g>
    <g transform="translate(838 0)">
      <circle cx="18" cy="18" r="18" fill="#2563eb"/>
      <text x="52" y="24">Google Cloud</text>
    </g>
  </g>
</svg>
